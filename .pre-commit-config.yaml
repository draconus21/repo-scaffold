# Pre-commit hooks: ruff lint, ruff format, and pyrefly type-check. Hooks run through
# `uv run` so they use the exact ruff/pyrefly versions pinned in pyproject.toml — no
# separate version to keep in sync.
#
# Enable once per clone:  uv run pre-commit install
# Run on all files:       uv run pre-commit run --all-files
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: pyrefly
        name: pyrefly check
        entry: uv run pyrefly check
        language: system
        types: [python]
        # pyrefly type-checks the whole project (config-driven), not just staged files.
        pass_filenames: false
        require_serial: true
