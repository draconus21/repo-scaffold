# Minimal CI: lint and type-check on the same uv + Python toolchain as the devcontainer.
# ruff/pyrefly auto-discover their config from pyproject.toml (run from the repo root).
stages:
  - test

.uv:
  image: ghcr.io/astral-sh/uv:python3.10-bookworm-slim
  before_script:
    - uv sync

lint:
  extends: .uv
  stage: test
  script:
    - uv run ruff check .
    - uv run ruff format --check .

type:
  extends: .uv
  stage: test
  script:
    - uv run pyrefly check
